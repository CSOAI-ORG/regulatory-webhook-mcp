name: regulatory-webhook-mcp
description: MCP server for regulatory webhook. Features subscribe, get recent changes,
  check for updates. From MEOK AI Labs.
version: 1.0.0
tools:
- name: subscribe
  description: Subscribe to regulatory update notifications.
  parameters:
  - name: email
    type: string
    required: true
  - name: frameworks
    type: string
    required: false
- name: get_recent_changes
  description: Get recent regulatory changes.
  parameters:
  - name: framework
    type: string
    required: false
  - name: days
    type: integer
    required: false
- name: check_for_updates
  description: Check if any monitored frameworks have recent updates.
  parameters:
  - name: frameworks
    type: string
    required: false
- name: list_subscribers
  description: List all webhook subscribers.
  parameters: []
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
    - apiKey
    properties:
      apiKey:
        type: string
        description: Your MEOK API Key
  commandFunction: "(config) => ({\n  command: 'uvx',\n  args: ['regulatory-webhook-mcp',\
    \ '--api-key', config.apiKey],\n  env: {\n    MEOK_API_KEY: config.apiKey\n  }\n\
    })"
